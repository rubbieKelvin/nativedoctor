[package]
name = "nd-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "nativedoctor"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
nd-core = { path = "../nd-core" }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
