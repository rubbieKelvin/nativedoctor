$schema: http://json-schema.org/draft-07/schema#
definitions:
  SequenceStep:
    description: 'One entry in a sequence file: path to a request definition, relative to the sequence file dir.'
    properties:
      file:
        description: Path to a request file, relative to the sequence file’s directory.
        type: string
    required:
    - file
    type: object
description: Sequence document (JSON or YAML). Types live under [`crate::model`]; see [`crate::sequence`] to run.
properties:
  name:
    default: null
    description: Optional human-readable label (backward compatible when omitted).
    type:
    - string
    - 'null'
  steps:
    items:
      $ref: '#/definitions/SequenceStep'
    type: array
  version:
    default: 0.1.0
    description: Document schema version (default [`nd_constants::DOCUMENT_DEFAULT_VERSION`] if omitted).
    type: string
required:
- steps
title: SequenceFile
type: object
